# deploy/k8s/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: process-rec-api
  namespace: matterize
  labels:
    app: process-rec-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: process-rec-api
  template:
    metadata:
      labels:
        app: process-rec-api
    spec:
      containers:
      - name: api
        image: gcr.io/matterize-registry/process-rec-api:v2.1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: CLASSIFIER_MODEL_PATH
          value: "/app/models/classifier_v2.pkl"
        - name: COST_MODELS_DIR
          value: "/app/models/cost_v2/"
        - name: LOG_LEVEL
          value: "INFO"
        - name: MODEL_VERSION_TAG
          value: "classifier_v2_cost_v2"
        resources:
          limits:
            cpu: "1.0"
            memory: 1Gi
          requests:
            cpu: 250m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
