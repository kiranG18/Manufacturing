# XGBoost Hyperparameters for Cost Decomposition Models
#
# Default parameters applied to all processes unless overridden below.

default:
  n_estimators: 300
  max_depth: 5
  learning_rate: 0.06
  subsample: 0.8
  colsample_bytree: 0.75
  min_child_weight: 4
  reg_alpha: 0.2
  reg_lambda: 1.0
  random_state: 42
  n_jobs: -1
  verbosity: 0

overrides:
  cnc_milling:
    max_depth: 6
    learning_rate: 0.05
    n_estimators: 400
  sheet_metal_bending:
    max_depth: 4
    learning_rate: 0.08
    n_estimators: 250
  injection_molding:
    max_depth: 5
    learning_rate: 0.04
    n_estimators: 350
    reg_lambda: 2.0
  additive_slm:
    max_depth: 4
    learning_rate: 0.05
    n_estimators: 200
  sand_casting:
    max_depth: 3
    learning_rate: 0.05
    n_estimators: 150
    min_child_weight: 2
